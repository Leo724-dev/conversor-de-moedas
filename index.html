<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <title>Conversor de Moedas</title>
</head>
<body>

    <img src="img/logo.gif" alt="logo-conversor-de-moedas">

    <main>
        <label for="real">Converter <b>de</b></label>
        <select name="real" id="real">
            <option>R$ Real Brasileiro</option>
        </select>

        <label for="dolar">Converter <b>para</b></label>
        <select name="dolar" id="dolar">
            <option>US$ Dolar Americano</option>
            <option>€ Euro</option>
        </select>

        <label for="valor">Valor</label>
        <input type="number" name="valor" id="valor" placeholder="R$ 10.000,00">

        <button class="converter">Converter</button>

        <section>
            <div>
                <img src="img/brasil 2.png" alt="moeda-brasileira">

                <p>Real</p>
                <p>R$ 0,00</p>
            </div>

            <img src="img/arrow.png" alt="seta">

            <div>
                <img src="img/estados-unidos (1) 1.png" alt="moeda-americana">

                <p>Dólar</p>
                <p>US$ 0.0</p>
            </div>

        </section>

    </main>
    
</body>
</html>

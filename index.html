<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/style.css">
    <title>Conversor de Moedas</title>
</head>
<body>

    <img class="logo-gif" src="img/logo-conversor.avif" alt="logo-conversor-de-moedas">

    <main>
        <label for="real">Converter <b>de</b></label>
        <select name="real" id="real">
            <option>R$ Real Brasileiro</option>
        </select>

        <label for="dolar">Converter <b>para</b></label>
        <select name="dolar" id="moeda-pais">
            <option value="dolar">US$ Dolar Americano</option>
            <option value="euro">€ Euro</option>
            <option value="libra"> £ Libra</option>
            <option value="iene">¥ Iene</option>
        </select>

        <label for="valor">Valor</label>
        <input type="number" name="valor" id="valor" placeholder="R$ 10.000,00">

        <button class="converter">Converter</button>

        <section>
            <div class="caixa">
                <img src="image/brasil.png" alt="moeda-brasileira">

                <p class="moeda">Real</p>
                <p class="valor-moeda-convertida">R$ 0,00</pvc>
            </div>

            <img class="seta" src="image/arrow.png" alt="seta">

            <div class="caixa">
                <img src="image/eua.png" class="bandeira" alt="moeda-americana">

                <p class="moeda" id="nome-da-moeda">Dólar Americano</p>
                <p class="valor-moeda">US$ 0.0</p>
            </div>

        </section>

    </main>
    
</body>
<script src="js/script.js"></script>
</html>
